name: "Step 1: 选择版本"

on:
  workflow_dispatch:
    inputs:
      version:
        description: "选择 ImmortalWrt 版本"
        required: true
        type: choice
        options:
          - 24.10.6
          - 24.10.5

permissions:
  contents: write
  actions: write
  workflows: write

jobs:
  get-archs:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: 获取架构列表
        run: |
          VERSION="${{ github.event.inputs.version }}"
          TOKEN=$(curl -s "https://auth.docker.io/token?service=registry.docker.io&scope=repository:immortalwrt/imagebuilder:pull" | jq -r '.token')
          
          curl -sH "Authorization: Bearer $TOKEN" \
            "https://registry-1.docker.io/v2/immortalwrt/imagebuilder/tags/list?n=2000" | \
            jq -r '.tags[]' | grep "openwrt-${VERSION}$" | sed "s/-openwrt-${VERSION}//" | sort -u | tee /tmp/archs.txt
          
          echo "=== 数量: $(wc -l < /tmp/archs.txt) ==="

      - name: 更新 step2-arch.yml
        run: |
          chmod +x .github/workflows/update-options.sh
          .github/workflows/update-options.sh step2-arch.yml target_arch $(cat /tmp/archs.txt | tr '\n' ' ')

      - name: 提交
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add .github/workflows/step2-arch.yml
          git diff --staged --quiet || (git commit -m "Auto: archs for ${{ github.event.inputs.version }}" && git push)