name: "Step 1: 选择版本"

on:
  workflow_dispatch:
    inputs:
      version:
        description: "选择 ImmortalWrt 版本"
        required: true
        type: choice
        options:
          - 24.10.6
          - 24.10.5

permissions:
  contents: write

jobs:
  get-archs:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: 调试 Docker Hub API
        run: |
          echo "=== 直接 curl ==="
          curl -sv "https://hub.docker.com/v2/repositories/immortalwrt/imagebuilder/tags?page_size=5" 2>&1 | head -50
          
          echo "=== 带 token ==="
          TOKEN=$(curl -s "https://auth.docker.io/token?service=registry.docker.io&scope=repository:immortalwrt/imagebuilder:pull" | jq -r '.token')
          curl -sH "Authorization: Bearer $TOKEN" "https://registry-1.docker.io/v2/immortalwrt/imagebuilder/tags/list" | jq .