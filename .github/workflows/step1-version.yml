name: "Step 1: 选择版本"

on:
  workflow_dispatch:
    inputs:
      version:
        description: "选择 ImmortalWrt 版本"
        required: true
        type: choice
        options:
          - 24.10.6
          - 24.10.5

permissions:
  contents: write

jobs:
  get-archs:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: 获取所有架构
        run: |
          VERSION="${{ github.event.inputs.version }}"
          echo "🍞 获取版本 $VERSION 的可用架构..."

          curl -s "https://hub.docker.com/v2/repositories/immortalwrt/imagebuilder/tags?page_size=100" | \
            jq -r '.results[].name' | grep "openwrt-${VERSION}" | sed "s/-openwrt-${VERSION}//" | sort -u
        continue-on-error: true