name: "Step 1: 选择版本"

on:
  workflow_dispatch:
    inputs:
      version:
        description: "选择 ImmortalWrt 版本"
        required: true
        type: choice
        options:
          - 24.10.6
          - 24.10.5

permissions:
  contents: write
  actions: write

jobs:
  get-archs:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: 获取所有架构
        run: |
          VERSION="${{ github.event.inputs.version }}"
          echo "🍞 获取版本 $VERSION 的可用架构..."
          
          ARCHS=$(curl -s "https://hub.docker.com/v2/repositories/immortalwrt/imagebuilder/tags?page_size=100" | \
            jq -r '.results[].name' | grep "openwrt-${VERSION}" | sed "s/-openwrt-${VERSION}//" | sort -u)
          
          echo "$ARCHS" > /tmp/archs.txt
          echo "可用架构:"
          cat /tmp/archs.txt

      - name: 更新 step2-arch.yml
        run: |
          chmod +x .github/workflows/update-options.sh
          .github/workflows/update-options.sh step2-arch.yml target_arch $(cat /tmp/archs.txt | tr '\n' ' ')

      - name: 提交更新
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add .github/workflows/step2-arch.yml
          git diff --staged --quiet || git commit -m "Auto: arch list for ${{ github.event.inputs.version }}"
          git push

      - name: 触发 Step 2
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.actions.createWorkflowDispatch({
              owner: context.repo.owner,
              repo: context.repo.repo,
              workflow_id: 'step2-arch.yml',
              ref: 'main',
              inputs: {
                version: '${{ github.event.inputs.version }}'
              }
            });