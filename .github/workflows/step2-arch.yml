name: "Step 2: 选择架构"

on:
  workflow_dispatch:
    inputs:
      version:
        description: "ImmortalWrt 版本"
        required: true
        type: string
        default: ''
      target_arch:
        description: "选择目标架构"
        required: true
        type: choice
        options:
          - apm821xx-nand
          - apm821xx-sata
          - armsr-armv7
          - armsr-armv8
          - at91-sam9x
          - at91-sama5
          - at91-sama7
          - ath79-generic
          - ath79-mikrotik
          - ath79-nand
          - bcm27xx-bcm2708
          - bcm27xx-bcm2709
          - bcm27xx-bcm2710
          - bcm27xx-bcm2711
          - bcm27xx-bcm2712
          - bcm47xx-generic
          - bcm47xx-legacy
          - bcm47xx-mips74k
          - bcm4908-generic
          - bcm53xx-generic
          - bmips-bcm6318
          - bmips-bcm63268
          - bmips-bcm6328
          - bmips-bcm6358
          - bmips-bcm6362
          - bmips-bcm6368
          - d1-generic
          - gemini-generic
          - imx-cortexa53
          - imx-cortexa7
          - imx-cortexa9
          - ipq40xx-chromium
          - ipq40xx-generic
          - ipq40xx-mikrotik
          - ipq806x-chromium
          - ipq806x-generic
          - ixp4xx-generic
          - kirkwood-generic
          - lantiq-ase
          - lantiq-xrx200
          - lantiq-xrx200_legacy
          - lantiq-xway
          - lantiq-xway_legacy


permissions:
  contents: write
  actions: write

jobs:
  get-devices:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          token: ${{ secrets.PAT }}

      - name: 获取设备列表
        run: |
          ARCH="${{ github.event.inputs.target_arch }}"
          VERSION="${{ github.event.inputs.version }}"
          IMAGE="${ARCH}-openwrt-${VERSION}"
          
          echo "🍞 获取设备..."
          docker run --rm immortalwrt/imagebuilder:$IMAGE \
            make info 2>/dev/null | grep -oP '^\s*\K[^\s:]+(?=:)' | \
            grep -v "Current\|Default\|Available\|Target\|Architecture\|Revision\|Packages" | sort -u | tee /tmp/devices.txt

      - name: 更新 step3-build.yml
        run: |
          DEVICES=$(cat /tmp/devices.txt | tr '\n' ' ')
          [ -z "$DEVICES" ] && DEVICES="generic"
          
          python3 << 'EOF'
import re

with open('.github/workflows/step3-build.yml', 'r') as f:
    content = f.read()

options = ""
for d in """$DEVICES""".split():
    options += f"          - {d}\n"

content = re.sub(
    r'(device:.*?options:)\s*\n(.*?)(\n      [a-z])',
    '\\1\n' + options + '\\3',
    content,
    flags=re.DOTALL
)

with open('.github/workflows/step3-build.yml', 'w') as f:
    f.write(content)
EOF

      - name: 提交
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "Auto: devices for ${{ github.event.inputs.target_arch }}"
          file_pattern: '.github/workflows/step3-build.yml'
