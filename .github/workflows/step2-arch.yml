name: "Step 2: 选择架构"

on:
  workflow_dispatch:
    inputs:
      version:
        description: "ImmortalWrt 版本"
        required: true
        type: string
      
          - apm821xx-nand
          - apm821xx-sata
          - armsr-armv7
          - armsr-armv8
          - at91-sam9x
          - at91-sama5
          - at91-sama7
          - ath79-generic
          - ath79-mikrotik
          - ath79-nand
          - bcm27xx-bcm2708
          - bcm27xx-bcm2709
          - bcm27xx-bcm2710
          - bcm27xx-bcm2711
          - bcm27xx-bcm2712
          - bcm47xx-generic
          - bcm47xx-legacy
          - bcm47xx-mips74k
          - bcm4908-generic
          - bcm53xx-generic
          - bmips-bcm6318
          - bmips-bcm63268
          - bmips-bcm6328
          - bmips-bcm6358
          - bmips-bcm6362
          - bmips-bcm6368
          - d1-generic
          - gemini-generic
          - imx-cortexa53
          - imx-cortexa7
          - imx-cortexa9
          - ipq40xx-chromium
          - ipq40xx-generic
          - ipq40xx-mikrotik
          - ipq806x-chromium
          - ipq806x-generic
          - ixp4xx-generic
          - kirkwood-generic
          - lantiq-ase
          - lantiq-xrx200
          - lantiq-xrx200_legacy
          - lantiq-xway
          - lantiq-xway_legacy
  # 由 step1 自动填充

permissions:
  contents: write
  actions: write

jobs:
  get-devices:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: 获取设备列表
        run: |
          ARCH="${{ github.event.inputs.target_arch }}"
          VERSION="${{ github.event.inputs.version }}"
          IMAGE="${ARCH}-openwrt-${VERSION}"
          
          echo "🍞 获取 $ARCH 的设备列表..."
          PROFILES=$(docker run --rm immortalwrt/imagebuilder:$IMAGE \
            make info 2>/dev/null | grep -oP '^\s*\K[^\s:]+(?=:)' | grep -v "Current\|Default\|Available\|Target\|Architecture\|Revision\|Packages" | sort -u)
          
          echo "$PROFILES" > /tmp/devices.txt
          echo "可用设备:"
          cat /tmp/devices.txt

      - name: 更新 step3-build.yml
        run: |
          chmod +x .github/workflows/update-options.sh
          .github/workflows/update-options.sh step3-build.yml device $(cat /tmp/devices.txt | tr '\n' ' ')

      - name: 提交更新
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add .github/workflows/step3-build.yml
          git diff --staged --quiet || git commit -m "Auto: device list for ${{ github.event.inputs.target_arch }}"
          git push

      - name: 触发 Step 3
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.actions.createWorkflowDispatch({
              owner: context.repo.owner,
              repo: context.repo.repo,
              workflow_id: 'step3-build.yml',
              ref: 'main',
              inputs: {
                version: '${{ github.event.inputs.version }}',
                target_arch: '${{ github.event.inputs.target_arch }}'
              }
            });