name: "Step 3: 选择设备并构建"

on:
  workflow_dispatch:
    inputs:
      version:
        description: "ImmortalWrt 版本"
        required: true
        type: string
      target_arch:
        description: "目标架构"
        required: true
        type: string
      device:
        description: "选择设备"
        required: true
        type: choice
        options: []  # 由 step2 自动填充
      rom_size:
        description: "固件大小(MB)"
        required: true
        type: string
        default: '512'

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: 准备输出目录
        run: |
          mkdir -p output
          chmod 777 output

      - name: Build firmware
        run: |
          ARCH="${{ github.event.inputs.target_arch }}"
          VERSION="${{ github.event.inputs.version }}"
          IMAGE="${ARCH}-openwrt-${VERSION}"
          
          case $ARCH in
            x86-64)
              TARGET="x86"
              SUBTARGET="64"
              ;;
            rockchip-armv8)
              TARGET="rockchip"
              SUBTARGET="armv8"
              ;;
            mediatek-filogic)
              TARGET="mediatek"
              SUBTARGET="filogic"
              ;;
            *)
              TARGET=$(echo $ARCH | cut -d- -f1)
              SUBTARGET=$(echo $ARCH | cut -d- -f2- | sed 's/-/\//g')
              ;;
          esac

          docker run --rm -i \
            -v "${{ github.workspace }}:/home/build/custom" \
            -e TARGET="$TARGET" \
            -e SUBTARGET="$SUBTARGET" \
            -e PROFILE="PROFILE=\"${{ github.event.inputs.device }}\"" \
            -e ROM_SIZE="${{ github.event.inputs.rom_size }}" \
            immortalwrt/imagebuilder:$IMAGE \
            /bin/bash /home/build/custom/build24.sh

      - name: 修复输出权限
        if: always()
        run: |
          if [ -d "output" ]; then
            sudo chown -R $(id -u):$(id -g) output 2>/dev/null || true
            chmod -R 755 output 2>/dev/null || true
          fi

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: Firmware-${{ github.event.inputs.target_arch }}-${{ github.event.inputs.device }}
          path: output/*

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event.inputs.version }}-${{ github.run_id }}
          name: ImmortalWrt ${{ github.event.inputs.version }} - ${{ github.event.inputs.device }}
          body: |
            ## 构建信息
            - 版本: ${{ github.event.inputs.version }}
            - 架构: ${{ github.event.inputs.target_arch }}
            - 设备: ${{ github.event.inputs.device }}
            - 固件大小: ${{ github.event.inputs.rom_size }} MB
          files: output/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}