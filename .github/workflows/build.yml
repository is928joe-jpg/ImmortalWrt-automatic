      rom_size:
        description: "固件大小(MB)"
        required: true
        type: string
        default: '512'

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
        uses: actions/checkout@v6

        run: |
          mkdir -p output
          chmod 777 output

        id: artifact
        run: |
          echo "name=$(echo '${{ github.event.inputs.target }}' | sed 's|/|-|g')" >> $GITHUB_OUTPUT

        run: |
          TARGET_INPUT="${{ github.event.inputs.target }}"
          ARCH="${TARGET_INPUT%%/*}"
          DEVICE="${TARGET_INPUT##*/}"
          VERSION="${{ github.event.inputs.version }}"
          IMAGE="${ARCH}-openwrt-${VERSION}"

          case "$ARCH" in
            x86-64)      TARGET="x86";    SUBTARGET="64" ;;
            x86-generic) TARGET="x86";    SUBTARGET="generic" ;;
            x86-legacy)  TARGET="x86";    SUBTARGET="legacy" ;;
            x86-geode)   TARGET="x86";    SUBTARGET="geode" ;;
            *)
              TARGET="${ARCH%%-*}"
              SUBTARGET="${ARCH#*-}"
              ;;
          esac

          if [ "$DEVICE" = "generic" ]; then
            PROFILE=""
          else
            PROFILE="PROFILE=\"$DEVICE\""
          fi

          docker run --rm -i \
            -v "${{ github.workspace }}:/home/build/custom" \
            -e TARGET="$TARGET" \
            -e SUBTARGET="$SUBTARGET" \
            -e PROFILE="$PROFILE" \
            -e ROM_SIZE="${{ github.event.inputs.rom_size }}" \
            immortalwrt/imagebuilder:$IMAGE \
            /bin/bash /home/build/custom/build24.sh

        if: always()
        run: |
          if [ -d "output" ]; then
            sudo chown -R $(id -u):$(id -g) output 2>/dev/null || true
            chmod -R 755 output 2>/dev/null || true
          fi

        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.artifact.outputs.name }}-${{ github.event.inputs.version }}
          path: output/*

        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event.inputs.version }}-${{ github.run_id }}
          name: ImmortalWrt ${{ github.event.inputs.version }} - ${{ github.event.inputs.target }}
          body: |
          files: output/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
