name: Build ImmortalWrt 24.10.x 

on:
  workflow_dispatch:
    inputs:
      rom_size:
        description: "固件大小(MB)"
        required: true
        default: '512'
      version:
        description: "ImmortalWrt 版本 (例如: 24.10.6)"
        required: true
        default: '24.10.6'
      image_types:
        description: "镜像类型（多选用逗号分隔，留空=全部）\n可选: combined-efi-ext4, combined-efi-squashfs, combined-ext4, combined-squashfs, rootfs-ext4, rootfs-squashfs, rootfs-targz, iso-efi, iso"
        required: false
        default: 'combined-efi-ext4,combined-efi-squashfs'
  schedule:
    - cron: '0 2 * * 1'

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Build firmware
        env:
          BUILD_VERSION: ${{ github.event.inputs.version || '24.10.6' }}
          ROM_SIZE: ${{ github.event.inputs.rom_size || '512' }}
          IMAGE_TYPES: ${{ github.event.inputs.image_types }}
        run: |
          docker run --rm -i \
            -v "${{ github.workspace }}:/home/build/custom" \
            -e PROFILE=$ROM_SIZE \
            -e IMAGE_TYPES="$IMAGE_TYPES" \
            immortalwrt/imagebuilder:x86-64-openwrt-$BUILD_VERSION \
            /bin/bash /home/build/custom/x86-64/build24.sh

      - name: Upload firmware
        uses: actions/upload-artifact@v4
        with:
          name: ImmortalWrt-Firmware
          path: output/*

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.BUILD_VERSION }}-${{ github.run_id }}
          name: ImmortalWrt ${{ env.BUILD_VERSION }} Build
          files: output/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}