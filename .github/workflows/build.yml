name: Build ImmortalWrt 24.10.x 

on:
  workflow_dispatch:
    inputs:
      rom_size:
        description: "固件大小(MB)"
        required: true
        default: '512'
      version:
        description: "ImmortalWrt 版本 (例如: 24.10.6)"
        required: true
        default: '24.10.6'
      image_types:
        description: "镜像类型（多选用逗号分隔，留空=全部）\n可选: combined-efi, combined, rootfs-ext4, rootfs-squashfs"
        required: false
        default: 'combined-efi,combined'
  schedule:
    - cron: '0 2 * * 1'

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Build firmware
        env:
          BUILD_VERSION: ${{ github.event.inputs.version || '24.10.6' }}
          ROM_SIZE: ${{ github.event.inputs.rom_size || '512' }}
        run: |
          docker run --rm -i \
            -v "${{ github.workspace }}:/home/build/custom" \
            -e PROFILE=$ROM_SIZE \
            immortalwrt/imagebuilder:x86-64-openwrt-$BUILD_VERSION \
            /bin/bash /home/build/custom/x86-64/build24.sh

      - name: 筛选需要的镜像
        id: filter
        run: |
          IMAGE_TYPES="${{ github.event.inputs.image_types }}"
          
          # 如果为空或all，则全部复制
          if [ -z "$IMAGE_TYPES" ] || [ "$IMAGE_TYPES" = "all" ]; then
            echo "📦 复制所有镜像"
            mkdir -p filtered_output
            cp -r output/* filtered_output/
          else
            # 按逗号分割
            IFS=',' read -ra TYPES <<< "$IMAGE_TYPES"
            
            echo "📦 筛选镜像类型: ${TYPES[*]}"
            
            for TYPE in "${TYPES[@]}"; do
              # 去除前后空格
              TYPE=$(echo "$TYPE" | xargs)
              echo "  处理: $TYPE"
              
              # 复制匹配的 .bin 文件
              find output -name "*${TYPE}*.bin" -exec cp {} filtered_output/ \;
              # 复制对应的校验文件
              find output -name "*${TYPE}*.sha256sums" -exec cp {} filtered_output/ \;
              find output -name "*${TYPE}*.manifest" -exec cp {} filtered_output/ \;
            done
            
            # 如果没有找到任何文件，复制全部（兜底）
            if [ -z "$(ls -A filtered_output 2>/dev/null)" ]; then
              echo "⚠️ 未找到匹配的镜像，复制所有文件"
              cp -r output/* filtered_output/
            fi
          fi
          
          echo ""
          echo "筛选后的文件："
          ls -la filtered_output/

      - name: Upload firmware
        uses: actions/upload-artifact@v4
        with:
          name: ImmortalWrt-Firmware
          path: filtered_output/*

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.BUILD_VERSION }}-${{ github.run_id }}
          name: ImmortalWrt ${{ env.BUILD_VERSION }} Build
          files: filtered_output/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}