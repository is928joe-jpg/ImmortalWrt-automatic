name: Build ImmortalWrt

on:
  workflow_dispatch:
    inputs:
      version:
        description: "ImmortalWrt 版本"
        required: true
        type: choice
        options:
          - 24.10.6
          - 24.10.5
      target:
        description: "目标架构/设备"
        required: true
        type: choice
        options:
          - apm821xx-nand/generic
          - apm821xx-sata/generic
          - armsr-armv7/generic
          - armsr-armv8/generic
          - at91-sam9x/generic
          - at91-sama5/generic
          - at91-sama7/generic
          - ath79-generic/generic
          - ath79-mikrotik/generic
          - ath79-nand/generic
          - bcm27xx-bcm2708/generic
          - bcm27xx-bcm2709/generic
          - bcm27xx-bcm2710/generic
          - bcm27xx-bcm2711/generic
          - bcm27xx-bcm2712/generic
          - bcm47xx-generic/generic
          - bcm47xx-legacy/generic
          - bcm47xx-mips74k/generic
          - bcm4908-generic/generic
          - bcm53xx-generic/generic
          - bmips-bcm6318/generic
          - bmips-bcm63268/generic
          - bmips-bcm6328/generic
          - bmips-bcm6358/generic
          - bmips-bcm6362/generic
          - bmips-bcm6368/generic
          - d1-generic/generic
          - gemini-generic/generic
          - imx-cortexa53/generic
          - imx-cortexa7/generic
          - imx-cortexa9/generic
          - ipq40xx-chromium/generic
          - ipq40xx-generic/generic
          - ipq40xx-mikrotik/generic
          - ipq806x-chromium/generic
          - ipq806x-generic/generic
          - ixp4xx-generic/generic
          - kirkwood-generic/generic
          - lantiq-ase/generic
          - lantiq-xrx200/generic
          - lantiq-xrx200_legacy/generic
          - lantiq-xway/generic
          - lantiq-xway_legacy/generic
          - layerscape-armv8_64b/generic
          - loongarch64-generic/generic
          - malta-be/generic
          - mediatek-filogic/xiaomi_ax6000
          - mediatek-mt7622/generic
          - mediatek-mt7623/generic
          - mediatek-mt7629/generic
          - mpc85xx-p1010/generic
          - mpc85xx-p1020/generic
          - mpc85xx-p2020/generic
          - mvebu-cortexa53/generic
          - mvebu-cortexa72/generic
          - mvebu-cortexa9/generic
          - mxs-generic/generic
          - octeon-generic/generic
          - omap-generic/generic
          - pistachio-generic/generic
          - qoriq-generic/generic
          - rockchip-armv8/friendlyarm_nanopi-r4s
          - sifiveu-generic/generic
          - starfive-generic/generic
          - sunxi-cortexa7/generic
          - sunxi-cortexa8/generic
          - sunxi-cortexa53/generic
          - tegra-generic/generic
          - uml/generic
          - x86-64/generic
          - x86-generic/generic
          - x86-geode/generic
          - x86-legacy/generic
          - zynq-generic/generic
      rom_size:
        description: "固件大小(MB)"
        required: true
        type: string
        default: '512'

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: 准备输出目录
        run: |
          mkdir -p output
          chmod 777 output

      - name: Set artifact name
        id: artifact
        run: |
          echo "name=$(echo '${{ github.event.inputs.target }}' | sed 's|/|-|g')" >> $GITHUB_OUTPUT

      - name: Build firmware
        run: |
          TARGET_INPUT="${{ github.event.inputs.target }}"
          ARCH="${TARGET_INPUT%%/*}"
          DEVICE="${TARGET_INPUT##*/}"
          VERSION="${{ github.event.inputs.version }}"
          IMAGE="${ARCH}-openwrt-${VERSION}"

          case "$ARCH" in
            x86-64)      TARGET="x86";    SUBTARGET="64" ;;
            x86-generic) TARGET="x86";    SUBTARGET="generic" ;;
            x86-legacy)  TARGET="x86";    SUBTARGET="legacy" ;;
            x86-geode)   TARGET="x86";    SUBTARGET="geode" ;;
            *)
              TARGET="${ARCH%%-*}"
              SUBTARGET="${ARCH#*-}"
              ;;
          esac

          if [ "$DEVICE" = "generic" ]; then
            PROFILE=""
          else
            PROFILE="PROFILE=\"$DEVICE\""
          fi

          docker run --rm -i \
            -v "${{ github.workspace }}:/home/build/custom" \
            -e TARGET="$TARGET" \
            -e SUBTARGET="$SUBTARGET" \
            -e PROFILE="$PROFILE" \
            -e ROM_SIZE="${{ github.event.inputs.rom_size }}" \
            immortalwrt/imagebuilder:$IMAGE \
            /bin/bash /home/build/custom/build24.sh

      - name: 修复输出权限
        if: always()
        run: |
          if [ -d "output" ]; then
            sudo chown -R $(id -u):$(id -g) output 2>/dev/null || true
            chmod -R 755 output 2>/dev/null || true
          fi

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.artifact.outputs.name }}-${{ github.event.inputs.version }}
          path: output/*

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event.inputs.version }}-${{ github.run_id }}
          name: ImmortalWrt ${{ github.event.inputs.version }} - ${{ github.event.inputs.target }}
          body: |
            - 版本: ${{ github.event.inputs.version }}
            - 目标: ${{ github.event.inputs.target }}
            - 固件大小: ${{ github.event.inputs.rom_size }} MB
          files: output/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}