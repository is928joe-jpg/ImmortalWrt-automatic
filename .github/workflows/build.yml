name: Build ImmortalWrt

on:
  workflow_dispatch:
    inputs:
      rom_size:
        description: "固件大小(MB)"
        required: true
        default: '1024'
      version:
        description: "ImmortalWrt 版本 (例如: 24.10.6)"
        required: true
        default: '24.10.6'
  schedule:
    - cron: '0 2 * * 1'

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Build
        env:
          BUILD_VERSION: ${{ github.event.inputs.version || '24.10.6' }}
          ROM_SIZE: ${{ github.event.inputs.rom_size || '1024' }}
        run: |
          echo "正在构建版本: $BUILD_VERSION, 大小: $ROM_SIZE MB"
          docker run --rm -i \
            -v "${{ github.workspace }}:/home/build/custom" \
            -e PROFILE=$ROM_SIZE \
            immortalwrt/imagebuilder:x86-64-openwrt-$BUILD_VERSION \
            /bin/bash /home/build/custom/x86-64/build24.sh