name: Build ImmortalWrt Multi-Arch

on:
  workflow_dispatch:
    inputs:
      version:
        description: "选择 ImmortalWrt 版本"
        required: true
        type: choice
        options:
          - 24.10.6
          - 24.10.5
      target:
        description: "选择目标设备"
        required: true
        type: choice
        options:
          - x86-64 (generic)
          - friendlyarm_nanopi-r4s
          - xiaomi_ax6000
      rom_size:
        description: "固件大小(MB)"
        required: true
        default: '512'

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: 准备输出目录
        run: |
          mkdir -p output
          chmod 777 output

      - name: Build firmware
        run: |
          case "${{ github.event.inputs.target }}" in
            "x86-64 (generic)")
              TARGET="x86"
              SUBTARGET="64"
              IMAGE="x86-64"
              PROFILE=""
              ;;
            "friendlyarm_nanopi-r4s")
              TARGET="rockchip"
              SUBTARGET="armv8"
              IMAGE="rockchip-armv8"
              PROFILE='PROFILE="friendlyarm_nanopi-r4s"'
              ;;
            "xiaomi_ax6000")
              TARGET="mediatek"
              SUBTARGET="filogic"
              IMAGE="mediatek-filogic"
              PROFILE='PROFILE="xiaomi_ax6000"'
              ;;
          esac

          docker run --rm -i \
            -v "${{ github.workspace }}:/home/build/custom" \
            -e TARGET="$TARGET" \
            -e SUBTARGET="$SUBTARGET" \
            -e PROFILE="$PROFILE" \
            -e ROM_SIZE="${{ github.event.inputs.rom_size }}" \
            -e VERSION="${{ github.event.inputs.version }}" \
            -e TARGET_NAME="${{ github.event.inputs.target }}" \
            immortalwrt/imagebuilder:${IMAGE}-openwrt-${{ github.event.inputs.version }} \
            /bin/bash /home/build/custom/build24.sh

      - name: 修复输出权限
        if: always()
        run: |
          if [ -d "output" ]; then
            sudo chown -R $(id -u):$(id -g) output 2>/dev/null || true
            chmod -R 755 output 2>/dev/null || true
          fi

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: Firmware-${{ github.event.inputs.target }}-${{ github.event.inputs.version }}
          path: output/*

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event.inputs.version }}-${{ github.event.inputs.target }}-${{ github.run_id }}
          name: ImmortalWrt ${{ github.event.inputs.version }} - ${{ github.event.inputs.target }}
          body: |
            ## 构建信息
            - 版本: ${{ github.event.inputs.version }}
            - 设备: ${{ github.event.inputs.target }}
            - 固件大小: ${{ github.event.inputs.rom_size }} MB
            - 构建编号: ${{ github.run_id }}
          files: output/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}