name: Build ImmortalWrt

on:
  workflow_dispatch:
    inputs:
      rom_size:
        description: "固件大小(MB)"
        required: true
        default: '1024'
      version:
        description: "ImmortalWrt 版本 (例如: 24.10.6)"
        required: true
        default: '24.10.6'
  schedule:
    - cron: '0 2 * * 1'

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Build
        # 使用 env 获取动态版本号，如果手动触发则使用输入值，否则使用默认值
        env:
          BUILD_VERSION: ${{ github.event.inputs.version || '24.10.6' }}
        run: |
          echo "正在构建版本: $BUILD_VERSION"
          docker run --rm -i \
            -v "${{ github.workspace }}:/home/build/immortalwrt" \
            -e PROFILE=${{ github.event.inputs.rom_size || '1024' }} \
            immortalwrt/imagebuilder:x86-64-openwrt-$BUILD_VERSION /bin/bash /home/build/immortalwrt/x86-64/build24.sh