name: Build ImmortalWrt Multi-Arch

on:
  workflow_dispatch:
    inputs:
      version:
        description: "选择 ImmortalWrt 版本"
        required: true
        type: choice
        options:
          - 24.10.6
          - 24.10.5
      target_arch:
        description: "选择目标架构"
        required: true
        type: choice
        options:
          - x86-64
          - rockchip-armv8
          - mediatek-filogic
      profile:
        description: "设备 Profile（x86-64 留空）"
        required: false
        default: ''
      rom_size:
        description: "固件大小(MB)"
        required: true
        default: '512'

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: 准备输出目录
        run: |
          echo "========================================="
          echo "🍞 准备输出目录"
          mkdir -p output
          chmod 777 output
          echo "  当前用户: $(id)"
          echo "  工作目录: $(pwd)"
          echo "  目录结构:"
          ls -la
          echo "  output 目录权限:"
          ls -ld output
          echo "========================================="

      - name: Build firmware
        run: |
          echo "========================================="
          echo "🍞 开始构建流程"
          echo "  版本: ${{ github.event.inputs.version }}"
          echo "  架构: ${{ github.event.inputs.target_arch }}"
          echo "  固件大小: ${{ github.event.inputs.rom_size }}MB"
          
          case "${{ github.event.inputs.target_arch }}" in
            x86-64)
              TARGET="x86"
              SUBTARGET="64"
              IMAGE="x86-64"
              ;;
            rockchip-armv8)
              TARGET="rockchip"
              SUBTARGET="armv8"
              IMAGE="rockchip-armv8"
              ;;
            mediatek-filogic)
              TARGET="mediatek"
              SUBTARGET="filogic"
              IMAGE="mediatek-filogic"
              ;;
          esac
          
          echo "  解析结果:"
          echo "    TARGET=$TARGET"
          echo "    SUBTARGET=$SUBTARGET"
          echo "    IMAGE=$IMAGE"
          echo "    镜像: immortalwrt/imagebuilder:${IMAGE}-openwrt-${{ github.event.inputs.version }}"
          echo "========================================="
          
          echo "🍞 拉取并运行 Docker 容器"
          docker run --rm -i \
            -v "${{ github.workspace }}:/home/build/custom" \
            -e TARGET="$TARGET" \
            -e SUBTARGET="$SUBTARGET" \
            -e ROM_SIZE="${{ github.event.inputs.rom_size }}" \
            -e VERSION="${{ github.event.inputs.version }}" \
            -e TARGET_ARCH="${{ github.event.inputs.target_arch }}" \
            -e PROFILE_INPUT="${{ github.event.inputs.profile }}" \
            immortalwrt/imagebuilder:${IMAGE}-openwrt-${{ github.event.inputs.version }} \
            /bin/bash /home/build/custom/build24.sh
          
          echo "🍞 Docker 容器执行完毕"

      - name: 修复输出权限
        if: always()
        run: |
          echo "========================================="
          echo "🍞 修复输出文件权限"
          echo "  当前用户: $(id)"
          echo "  output 目录状态:"
          ls -ld output 2>/dev/null || echo "  output 目录不存在"
          echo "  output 内容:"
          ls -lh output/ 2>/dev/null || echo "  output 目录为空"
          
          if [ -d "output" ]; then
            echo "  修复权限中..."
            sudo chown -R $(id -u):$(id -g) output 2>/dev/null || echo "  ⚠️ chown 失败"
            chmod -R 755 output 2>/dev/null || echo "  ⚠️ chmod 失败"
            echo "  修复后 output 权限:"
            ls -ld output
          else
            echo "  ❌ output 目录不存在，无需修复"
          fi
          echo "========================================="

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: Firmware-${{ github.event.inputs.target_arch }}-${{ github.event.inputs.version }}
          path: output/*

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event.inputs.version }}-${{ github.event.inputs.target_arch }}-${{ github.run_id }}
          name: ImmortalWrt ${{ github.event.inputs.version }} - ${{ github.event.inputs.target_arch }}
          body: |
            ## 构建信息
            - 版本: ${{ github.event.inputs.version }}
            - 架构: ${{ github.event.inputs.target_arch }}
            - 固件大小: ${{ github.event.inputs.rom_size }} MB
            - 构建编号: ${{ github.run_id }}
          files: output/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}