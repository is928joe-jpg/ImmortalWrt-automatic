name: Build ImmortalWrt Multi-Arch

on:
  workflow_dispatch:
    inputs:
      version:
        description: "ImmortalWrt 版本"
        required: true
        default: '24.10.6'
      target:
        description: "CPU 架构 (例如: x86, rockchip, mediatek)"
        required: true
        default: 'x86'
      subtarget:
        description: "子架构 (例如: 64, armv8, filogic)"
        required: true
        default: '64'
      rom_size:
        description: "固件大小(MB)"
        required: true
        default: '512'

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Build firmware
        run: |
          docker run --rm -i \
            -v "${{ github.workspace }}:/home/build/custom" \
            -e TARGET=${{ github.event.inputs.target }} \
            -e SUBTARGET=${{ github.event.inputs.subtarget }} \
            -e PROFILE=$ROM_SIZE \
            -e VERSION=${{ github.event.inputs.version }} \
            immortalwrt/imagebuilder:${{ github.event.inputs.target }}-${{ github.event.inputs.subtarget }}-openwrt-${{ github.event.inputs.version }} \
            /bin/bash /home/build/custom/scripts/build.sh

      - name: Upload firmware
        uses: actions/upload-artifact@v4
        with:
          name: ImmortalWrt-${{ github.event.inputs.target }}
          path: output/*